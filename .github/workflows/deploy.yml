name: Deploy to GitHub Pages

# Publishes the built site to the `gh-pages` branch (root). GitHub Pages is
# configured to "Deploy from a branch" → gh-pages / (root) and serves it at
# https://aiidateam.github.io/aiida-website/.
#
# PR previews (.github/workflows/preview.yml) publish into pr-preview/pr-<N>/
# on the same branch. `keep_files: true` below ensures production deploys do
# not wipe those subdirs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true
          commit_message: "deploy: ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
