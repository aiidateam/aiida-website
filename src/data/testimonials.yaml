- type: literature
  citation: >-
    Giessen, E. et al. Roadmap on Multiscale Materials Modeling. Modelling
    Simul. Mater. Sci. Eng. 2020, 28 (4), 043001.
  url: https://doi.org/10.1088/1361-651X/ab7150
  quote: >-
    […] The ability to reproduce work is critical for the self-correcting
    mechanism of Science as explained above. It is also of great value to
    researchers themselves. Experimentalists are famous for maintaining
    meticulous lab notebooks that help them keep track of the large number of
    experiments (many unreported) that are necessary in order to understand a
    problem and obtain high-quality results. The field of molecular simulation
    (and simulations in general) do not have a similar culture. Students are
    typically not taught how to maintain order among the large numbers of
    preliminary simulations that they perform. Numerical simulations leave a
    wake of directories full of inputs and outputs with little or no
    documentation. Even the researcher who did the work (let alone other
    researchers) will find it difficult (and sometimes impossible) to go back
    to an earlier step, understand what was done, and reproduce the results.
    This culture is beginning to change with the emergence of workflow
    management tools such as AiiDA and Jupyter. These tools make it possible
    to document a simulation and in principle reproduce it. […]
